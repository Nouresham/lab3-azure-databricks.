$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
display_name: amazon_reviews_feature_pipeline

inputs:
  sampled_data:
    type: uri_folder
    path: azureml:amazon_electronics_features_v1_sampled@latest

outputs:
  merged_features_train:
    type: uri_folder
  merged_features_val:
    type: uri_folder
  merged_features_test:
    type: uri_folder
  merged_features_deploy:
    type: uri_folder

settings:
  default_compute: azureml:cpu-cluster

jobs:
  split:
    type: command
    component: azureml:split_dataset@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.inputs.sampled_data}}

  normalize_train:
    type: command
    component: azureml:normalize_text@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.split.outputs.train}}

  normalize_val:
    type: command
    component: azureml:normalize_text@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.split.outputs.val}}

  normalize_test:
    type: command
    component: azureml:normalize_text@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.split.outputs.test}}

  normalize_deploy:
    type: command
    component: azureml:normalize_text@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.split.outputs.deploy}}

  length_train:
    type: command
    component: azureml:length_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_train.outputs.out}}

  length_val:
    type: command
    component: azureml:length_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_val.outputs.out}}

  length_test:
    type: command
    component: azureml:length_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_test.outputs.out}}

  length_deploy:
    type: command
    component: azureml:length_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_deploy.outputs.out}}

  sentiment_train:
    type: command
    component: azureml:sentiment_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_train.outputs.out}}

  sentiment_val:
    type: command
    component: azureml:sentiment_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_val.outputs.out}}

  sentiment_test:
    type: command
    component: azureml:sentiment_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_test.outputs.out}}

  sentiment_deploy:
    type: command
    component: azureml:sentiment_features@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_deploy.outputs.out}}

  tfidf:
    type: command
    component: azureml:tfidf_features@latest
    compute: azureml:cpu-cluster
    inputs:
      train: ${{parent.jobs.normalize_train.outputs.out}}
      val: ${{parent.jobs.normalize_val.outputs.out}}
      test: ${{parent.jobs.normalize_test.outputs.out}}
      max_features: 500

  sbert_train:
    type: command
    component: azureml:sbert_embeddings@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_train.outputs.out}}

  sbert_val:
    type: command
    component: azureml:sbert_embeddings@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_val.outputs.out}}

  sbert_test:
    type: command
    component: azureml:sbert_embeddings@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_test.outputs.out}}

  sbert_deploy:
    type: command
    component: azureml:sbert_embeddings@latest
    compute: azureml:cpu-cluster
    inputs:
      data: ${{parent.jobs.normalize_deploy.outputs.out}}

  merge_train:
    type: command
    component: azureml:merge_features@latest
    compute: azureml:cpu-cluster
    inputs:
      length: ${{parent.jobs.length_train.outputs.out}}
      sentiment: ${{parent.jobs.sentiment_train.outputs.out}}
      tfidf: ${{parent.jobs.tfidf.outputs.train_out}}
      sbert: ${{parent.jobs.sbert_train.outputs.out}}
    outputs:
      out: ${{parent.outputs.merged_features_train}}

  merge_val:
    type: command
    component: azureml:merge_features@latest
    compute: azureml:cpu-cluster
    inputs:
      length: ${{parent.jobs.length_val.outputs.out}}
      sentiment: ${{parent.jobs.sentiment_val.outputs.out}}
      tfidf: ${{parent.jobs.tfidf.outputs.val_out}}
      sbert: ${{parent.jobs.sbert_val.outputs.out}}
    outputs:
      out: ${{parent.outputs.merged_features_val}}

  merge_test:
    type: command
    component: azureml:merge_features@latest
    compute: azureml:cpu-cluster
    inputs:
      length: ${{parent.jobs.length_test.outputs.out}}
      sentiment: ${{parent.jobs.sentiment_test.outputs.out}}
      tfidf: ${{parent.jobs.tfidf.outputs.test_out}}
      sbert: ${{parent.jobs.sbert_test.outputs.out}}
    outputs:
      out: ${{parent.outputs.merged_features_test}}

  merge_deploy:
    type: command
    component: azureml:merge_features@latest
    compute: azureml:cpu-cluster
    inputs:
      length: ${{parent.jobs.length_deploy.outputs.out}}
      sentiment: ${{parent.jobs.sentiment_deploy.outputs.out}}
      tfidf: ${{parent.jobs.tfidf.outputs.test_out}}
      sbert: ${{parent.jobs.sbert_deploy.outputs.out}}
    outputs:
      out: ${{parent.outputs.merged_features_deploy}}